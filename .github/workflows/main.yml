name: Deploy AI Worker to Linux Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ai-worker-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSHPASS: ${{ secrets.SSH_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.PY_WORKER_DEPLOY_PATH || secrets.DEPLOY_PATH }}
      WORKER_PORT: ${{ secrets.WORKER_PORT || '8099' }}
      WORKER_HOST: ${{ secrets.WORKER_HOST || '127.0.0.1' }}
      PYTHON_BIN: ${{ secrets.PYTHON_BIN || 'python3' }}
      ENABLE_STT: ${{ secrets.ENABLE_STT || 'true' }}
      ENABLE_TTS: ${{ secrets.ENABLE_TTS || 'true' }}
      STT_MODEL_ID: ${{ secrets.STT_MODEL_ID || 'openai/whisper-tiny.en' }}
      STT_LANGUAGE: 'en'
      PIPER_BIN: ${{ secrets.PIPER_BIN || 'piper' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Trust remote host
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH/models/piper'"

      - name: Install Python venv package
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "PYTHON_BIN='$PYTHON_BIN' bash -s" <<'EOF'
          set -euo pipefail
          PYTHON_VERSION=$($PYTHON_BIN --version 2>&1 | grep -oP '\d+\.\d+' | head -1)
          if ! dpkg -l | grep -q "python${PYTHON_VERSION}-venv"; then
            echo "Installing python${PYTHON_VERSION}-venv..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq "python${PYTHON_VERSION}-venv"
          else
            echo "python${PYTHON_VERSION}-venv already installed"
          fi
          EOF

      - name: Upload worker source + models from git
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '__pycache__/' \
            --exclude '.hf_cache/' \
            --exclude '_pydeps/' \
            --exclude 'venv/' \
            --exclude '.venv/' \
            --exclude 'worker.out.log' \
            --exclude 'worker.err.log' \
            --exclude 'worker.pid' \
            --exclude '*.pyc' \
            -e "ssh -p $SSH_PORT" \
            "./" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
          echo "✓ Source + models/piper/voice.onnx uploaded from git"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "PYTHON_BIN='$PYTHON_BIN' DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          "$PYTHON_BIN" -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip -q
          pip install -r requirements.txt -q
          EOF

      - name: Check and download Whisper STT model if missing
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' STT_MODEL_ID='$STT_MODEL_ID' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          . .venv/bin/activate

          # Check if whisper model already exists in HF cache
          MODEL_CACHE_DIR="$HOME/.cache/huggingface/hub/models--$(echo $STT_MODEL_ID | tr '/' '--')"
          if [ -d "$MODEL_CACHE_DIR" ] && [ "$(find "$MODEL_CACHE_DIR" -name 'model.safetensors' -o -name 'pytorch_model.bin' 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "✓ Whisper model already present: $MODEL_CACHE_DIR — skipping download"
          else
            echo "↓ Whisper model not found — downloading $STT_MODEL_ID (~40MB) ..."
            python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='$STT_MODEL_ID',
              allow_patterns=['config.json','generation_config.json','preprocessor_config.json',
                              'tokenizer.json','tokenizer_config.json','special_tokens_map.json',
                              'vocab.json','merges.txt','normalizer.json','*.model',
                              'model.safetensors','pytorch_model.bin'],
              ignore_patterns=['*.h5','*.msgpack','*.onnx','*.tflite','*.ckpt']
          )
          print('✓ Whisper download complete')
          "
          fi
          EOF

      - name: Check and install Piper binary if missing
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          . .venv/bin/activate

          # voice.onnx comes from git — just verify it arrived
          VOICE_ONNX="$DEPLOY_PATH/models/piper/voice.onnx"
          if [ -f "$VOICE_ONNX" ]; then
            echo "✓ voice.onnx present from git ($(du -sh $VOICE_ONNX | cut -f1))"
          else
            echo "✗ voice.onnx missing — something went wrong with rsync"
            exit 1
          fi

          # Check piper binary
          if command -v piper > /dev/null 2>&1; then
            echo "✓ Piper binary already installed — skipping"
          else
            echo "↓ Piper binary not found — installing via pip ..."
            pip install piper-tts -q && echo "✓ piper-tts installed"
          fi
          EOF

      - name: Stop existing worker
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          if [ -f "$DEPLOY_PATH/worker.pid" ]; then
            kill "$(cat $DEPLOY_PATH/worker.pid)" 2>/dev/null || true
            rm -f "$DEPLOY_PATH/worker.pid"
          fi
          pkill -f "$DEPLOY_PATH/main.py" 2>/dev/null || true
          sleep 1
          EOF

      - name: Start worker
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' WORKER_HOST='$WORKER_HOST' WORKER_PORT='$WORKER_PORT' ENABLE_STT='$ENABLE_STT' ENABLE_TTS='$ENABLE_TTS' STT_MODEL_ID='$STT_MODEL_ID' STT_LANGUAGE='$STT_LANGUAGE' PIPER_BIN='$PIPER_BIN' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          . .venv/bin/activate
          nohup env \
            WORKER_HOST="$WORKER_HOST" \
            WORKER_PORT="$WORKER_PORT" \
            ENABLE_STT="$ENABLE_STT" \
            ENABLE_TTS="$ENABLE_TTS" \
            STT_MODEL_ID="$STT_MODEL_ID" \
            STT_LANGUAGE="$STT_LANGUAGE" \
            PIPER_BIN="$PIPER_BIN" \
            PIPER_VOICE_MODEL="$DEPLOY_PATH/models/piper/voice.onnx" \
            python main.py > worker.out.log 2> worker.err.log < /dev/null &
          echo $! > worker.pid
          sleep 3
          ps -p "$(cat worker.pid)" > /dev/null || { echo "✗ Worker failed to start"; tail -30 worker.err.log; exit 1; }
          echo "✓ Worker started (pid=$(cat worker.pid))"
          EOF

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "WORKER_PORT='$WORKER_PORT' DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:${WORKER_PORT}/health" > /dev/null 2>&1; then
              echo "✓ Worker is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 3
          done
          echo "✗ Health check failed"
          tail -30 "$DEPLOY_PATH/worker.err.log" 2>/dev/null
          exit 1
          EOF
