name: Deploy AI Worker Docker Image to Linux Server

on:
  push:
    branches:
      - main
      - master
    paths:
      - "main.py"
      - "app/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/main.yml"
  workflow_dispatch:

concurrency:
  group: ai-worker-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSHPASS: ${{ secrets.SSH_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.PY_WORKER_DEPLOY_PATH || secrets.DEPLOY_PATH }}
      IMAGE_NAME: ${{ secrets.PY_WORKER_IMAGE_NAME || 'interview-ai-worker' }}
      CONTAINER_NAME: ${{ secrets.PY_WORKER_CONTAINER_NAME || 'interview-ai-worker' }}
      HOST_PORT: ${{ secrets.PY_WORKER_HOST_PORT || '9000' }}
      CONTAINER_PORT: ${{ secrets.PY_WORKER_CONTAINER_PORT || '9000' }}
      NETWORK_MODE: ${{ secrets.PY_WORKER_NETWORK_MODE || 'host' }}
      REMOTE_DOCKER: ${{ secrets.REMOTE_DOCKER || 'docker' }}
      ENABLE_LLM: ${{ secrets.PY_WORKER_ENABLE_LLM || secrets.ENABLE_LLM || 'true' }}
      LLM_API_URL: ${{ secrets.PY_WORKER_LLM_API_URL || secrets.LLM_API_URL || '' }}
      LLM_API_KEY: ${{ secrets.PY_WORKER_LLM_API_KEY || secrets.LLM_API_KEY || '' }}
      LLM_API_TIMEOUT_SECONDS: ${{ secrets.PY_WORKER_LLM_API_TIMEOUT_SECONDS || secrets.LLM_API_TIMEOUT_SECONDS || '45' }}
      OLLAMA_BASE_URL: ${{ secrets.PY_WORKER_OLLAMA_BASE_URL || secrets.OLLAMA_BASE_URL || 'http://host.docker.internal:11434' }}
      OLLAMA_LIGHT_MODEL: ${{ secrets.PY_WORKER_OLLAMA_LIGHT_MODEL || secrets.OLLAMA_LIGHT_MODEL || 'qwen2:1.5b' }}
      OLLAMA_HEAVY_MODEL: ${{ secrets.PY_WORKER_OLLAMA_HEAVY_MODEL || secrets.OLLAMA_HEAVY_MODEL || 'mistral:7b-instruct' }}
      OLLAMA_AUTO_PULL: ${{ secrets.PY_WORKER_OLLAMA_AUTO_PULL || secrets.OLLAMA_AUTO_PULL || 'true' }}
      OLLAMA_PRELOAD_ON_STARTUP: ${{ secrets.PY_WORKER_OLLAMA_PRELOAD_ON_STARTUP || secrets.OLLAMA_PRELOAD_ON_STARTUP || 'true' }}
      OLLAMA_PULL_TIMEOUT_SECONDS: ${{ secrets.PY_WORKER_OLLAMA_PULL_TIMEOUT_SECONDS || secrets.OLLAMA_PULL_TIMEOUT_SECONDS || '900' }}
      AI_FOUNDATION_MIN_SAMPLES: ${{ secrets.PY_WORKER_AI_FOUNDATION_MIN_SAMPLES || secrets.AI_FOUNDATION_MIN_SAMPLES || '300' }}
      ENABLE_STT: ${{ secrets.ENABLE_STT || 'false' }}
      ENABLE_TTS: ${{ secrets.ENABLE_TTS || 'false' }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install sshpass
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Trust remote host
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Stop existing ai-worker container
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "set -e; if $REMOTE_DOCKER ps -a --format '{{.Names}}' | grep -qx '$CONTAINER_NAME'; then $REMOTE_DOCKER stop '$CONTAINER_NAME' >/dev/null 2>&1 || true; $REMOTE_DOCKER rm '$CONTAINER_NAME' >/dev/null 2>&1 || true; fi"

      - name: Sync ai-worker source
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e rsync -avh --progress \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".venv/" \
            --exclude "_pydeps/" \
            --exclude "__pycache__/" \
            --exclude "worker.pid" \
            --exclude "*.log" \
            -e "ssh -p $SSH_PORT" \
            "./" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Build new ai-worker image on remote and prune old tags
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="${IMAGE_NAME}:${GITHUB_SHA}"
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "set -e; cd '$DEPLOY_PATH'; $REMOTE_DOCKER build -t '$IMAGE_REF' .; for img in \$($REMOTE_DOCKER images '$IMAGE_NAME' --format '{{.Repository}}:{{.Tag}}' | grep -vFx '$IMAGE_REF' || true); do $REMOTE_DOCKER rmi -f \"\$img\" >/dev/null 2>&1 || true; done"

      - name: Run ai-worker container
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="${IMAGE_NAME}:${GITHUB_SHA}"
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "IMAGE_REF='$IMAGE_REF' CONTAINER_NAME='$CONTAINER_NAME' HOST_PORT='$HOST_PORT' CONTAINER_PORT='$CONTAINER_PORT' NETWORK_MODE='$NETWORK_MODE' REMOTE_DOCKER='$REMOTE_DOCKER' ENABLE_LLM='$ENABLE_LLM' LLM_API_URL='$LLM_API_URL' LLM_API_KEY='$LLM_API_KEY' LLM_API_TIMEOUT_SECONDS='$LLM_API_TIMEOUT_SECONDS' OLLAMA_BASE_URL='$OLLAMA_BASE_URL' OLLAMA_LIGHT_MODEL='$OLLAMA_LIGHT_MODEL' OLLAMA_HEAVY_MODEL='$OLLAMA_HEAVY_MODEL' OLLAMA_AUTO_PULL='$OLLAMA_AUTO_PULL' OLLAMA_PRELOAD_ON_STARTUP='$OLLAMA_PRELOAD_ON_STARTUP' OLLAMA_PULL_TIMEOUT_SECONDS='$OLLAMA_PULL_TIMEOUT_SECONDS' AI_FOUNDATION_MIN_SAMPLES='$AI_FOUNDATION_MIN_SAMPLES' ENABLE_STT='$ENABLE_STT' ENABLE_TTS='$ENABLE_TTS' bash -s" <<'EOF'
          set -euo pipefail
          EFFECTIVE_OLLAMA_BASE_URL="$OLLAMA_BASE_URL"
          if [ "$NETWORK_MODE" = "host" ] && [ "$OLLAMA_BASE_URL" = "http://host.docker.internal:11434" ]; then
            EFFECTIVE_OLLAMA_BASE_URL="http://127.0.0.1:11434"
          fi
          # Free conflicting Docker containers that already publish HOST_PORT.
          CONFLICT_IDS="$($REMOTE_DOCKER ps -q --filter "publish=${HOST_PORT}" || true)"
          if [ -n "${CONFLICT_IDS}" ]; then
            echo "Found container(s) already publishing port ${HOST_PORT}; stopping/removing conflicts..."
            for cid in ${CONFLICT_IDS}; do
              cname="$($REMOTE_DOCKER inspect -f '{{.Name}}' "$cid" 2>/dev/null | sed 's#^/##' || true)"
              if [ -n "${cname}" ] && [ "${cname}" != "${CONTAINER_NAME}" ]; then
                echo "Stopping conflicting container: ${cname}"
                $REMOTE_DOCKER stop "${cname}" >/dev/null 2>&1 || true
                $REMOTE_DOCKER rm "${cname}" >/dev/null 2>&1 || true
              fi
            done
          fi

          # If a non-Docker process still owns the host port, fail with diagnostics.
          if ss -ltnp 2>/dev/null | grep -q ":${HOST_PORT} "; then
            echo "Port ${HOST_PORT} is still in use by non-container process:"
            ss -ltnp 2>/dev/null | grep ":${HOST_PORT} " || true
            exit 1
          fi

          RUN_ARGS=(
            -d
            --name "$CONTAINER_NAME"
            --restart unless-stopped
            -e WORKER_HOST=0.0.0.0
            -e WORKER_PORT="$CONTAINER_PORT"
            -e ENABLE_LLM="$ENABLE_LLM"
            -e LLM_API_URL="$LLM_API_URL"
            -e LLM_API_KEY="$LLM_API_KEY"
            -e LLM_API_TIMEOUT_SECONDS="$LLM_API_TIMEOUT_SECONDS"
            -e OLLAMA_BASE_URL="$EFFECTIVE_OLLAMA_BASE_URL"
            -e OLLAMA_LIGHT_MODEL="$OLLAMA_LIGHT_MODEL"
            -e OLLAMA_HEAVY_MODEL="$OLLAMA_HEAVY_MODEL"
            -e OLLAMA_AUTO_PULL="$OLLAMA_AUTO_PULL"
            -e OLLAMA_PRELOAD_ON_STARTUP="$OLLAMA_PRELOAD_ON_STARTUP"
            -e OLLAMA_PULL_TIMEOUT_SECONDS="$OLLAMA_PULL_TIMEOUT_SECONDS"
            -e AI_FOUNDATION_MIN_SAMPLES="$AI_FOUNDATION_MIN_SAMPLES"
            -e ENABLE_STT="$ENABLE_STT"
            -e ENABLE_TTS="$ENABLE_TTS"
          )
          if [ "$NETWORK_MODE" = "host" ]; then
            RUN_ARGS+=(--network host)
          else
            RUN_ARGS+=(--add-host=host.docker.internal:host-gateway -p "$HOST_PORT:$CONTAINER_PORT")
          fi
          RUN_ARGS+=("$IMAGE_REF")
          $REMOTE_DOCKER run "${RUN_ARGS[@]}"
          EOF

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "docker inspect '$CONTAINER_NAME' --format '{{.State.Running}}' 2>/dev/null | grep -q true"; then
              HEALTH_JSON="$(sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "curl -fsS http://127.0.0.1:${HOST_PORT}/health" 2>/dev/null || true)"
              if [ -n "$HEALTH_JSON" ]; then
                if HEALTH_JSON="$HEALTH_JSON" python -c "import json, os, sys; payload = json.loads(os.environ['HEALTH_JSON']); ready = bool(payload.get('deploymentReady')); reason = payload.get('deploymentReason', 'deployment_not_ready'); reachable = payload.get('ollamaReachable'); configured = payload.get('ollamaConfiguredModels', []); missing = payload.get('ollamaMissingConfiguredModels', []); base_url = payload.get('ollamaBaseUrl'); ollama_reason = payload.get('ollamaReason'); print('AI worker is healthy and configured Ollama models are ready' if ready else f'{reason} | reachable={reachable} | baseUrl={base_url} | ollamaReason={ollama_reason} | configured={configured} | missing={missing}'); sys.exit(0 if ready else 1)"
                then
                  exit 0
                fi
              fi
            fi
            echo "Waiting for ai-worker... ($i/60)"
            sleep 3
          done
          echo "AI worker health check failed"
          exit 1

      - name: Debug container on failure
        if: failure()
        shell: bash
        run: |
          set +e
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "echo '=== docker ps ==='; docker ps -a --filter name=$CONTAINER_NAME; echo '=== docker inspect state ==='; docker inspect $CONTAINER_NAME --format '{{json .State}}' 2>/dev/null || true; echo '=== container OLLAMA env ==='; docker inspect $CONTAINER_NAME --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep OLLAMA || true; echo '=== last 200 logs ==='; docker logs --tail 200 $CONTAINER_NAME 2>&1 || true; echo '=== in-container ollama probe ==='; docker exec $CONTAINER_NAME sh -c 'echo OLLAMA_BASE_URL=\"$OLLAMA_BASE_URL\"; curl -fsS -m 10 \"$OLLAMA_BASE_URL/api/tags\"' 2>&1 || true; echo '=== host port check ==='; ss -ltnp | grep :$HOST_PORT || true"

