name: Deploy AI Worker to Linux Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ai-worker-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSHPASS: ${{ secrets.SSH_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.PY_WORKER_DEPLOY_PATH || secrets.DEPLOY_PATH }}
      WORKER_PORT: ${{ secrets.WORKER_PORT || '8099' }}
      WORKER_HOST: ${{ secrets.WORKER_HOST || '127.0.0.1' }}
      PYTHON_BIN: ${{ secrets.PYTHON_BIN || 'python3' }}
      ENABLE_STT: ${{ secrets.ENABLE_STT || 'true' }}
      ENABLE_TTS: ${{ secrets.ENABLE_TTS || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Trust remote host
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Install Python venv package
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "PYTHON_BIN='$PYTHON_BIN' bash -s" <<'EOF'
          set -euo pipefail
          PYTHON_VERSION=$($PYTHON_BIN --version 2>&1 | grep -oP '\d+\.\d+' | head -1)
          if ! dpkg -l | grep -q "python${PYTHON_VERSION}-venv"; then
            echo "Installing python${PYTHON_VERSION}-venv..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq "python${PYTHON_VERSION}-venv"
          else
            echo "python${PYTHON_VERSION}-venv already installed"
          fi
          EOF

      - name: Upload worker source + models from git
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '__pycache__/' \
            --exclude '.hf_cache/' \
            --exclude '_pydeps/' \
            --exclude 'venv/' \
            --exclude '.venv/' \
            --exclude 'worker.out.log' \
            --exclude 'worker.err.log' \
            --exclude 'worker.pid' \
            --exclude '*.pyc' \
            -e "ssh -p $SSH_PORT" \
            "./" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
          echo "Source uploaded from git"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "PYTHON_BIN='$PYTHON_BIN' DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          "$PYTHON_BIN" -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip -q
          pip install -r requirements.txt -q
          EOF

      - name: Stop existing worker
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          if [ -f "$DEPLOY_PATH/worker.pid" ]; then
            kill "$(cat $DEPLOY_PATH/worker.pid)" 2>/dev/null || true
            rm -f "$DEPLOY_PATH/worker.pid"
          fi
          pkill -f "$DEPLOY_PATH/main.py" 2>/dev/null || true
          sleep 1
          EOF

      - name: Start worker
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' WORKER_HOST='$WORKER_HOST' WORKER_PORT='$WORKER_PORT' ENABLE_STT='$ENABLE_STT' ENABLE_TTS='$ENABLE_TTS' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          . .venv/bin/activate
          nohup env \
            WORKER_HOST="$WORKER_HOST" \
            WORKER_PORT="$WORKER_PORT" \
            ENABLE_STT="$ENABLE_STT" \
            ENABLE_TTS="$ENABLE_TTS" \
            python main.py > worker.out.log 2> worker.err.log < /dev/null &
          echo $! > worker.pid
          sleep 3
          ps -p "$(cat worker.pid)" > /dev/null || { echo "✗ Worker failed to start"; tail -30 worker.err.log; exit 1; }
          echo "✓ Worker started (pid=$(cat worker.pid))"
          EOF

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "WORKER_PORT='$WORKER_PORT' DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:${WORKER_PORT}/health" > /dev/null 2>&1; then
              echo "✓ Worker is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 3
          done
          echo "✗ Health check failed"
          tail -30 "$DEPLOY_PATH/worker.err.log" 2>/dev/null
          exit 1
          EOF
