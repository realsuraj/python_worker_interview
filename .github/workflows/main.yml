name: Deploy AI Worker Docker Image to Linux Server

on:
  push:
    branches:
      - main
      - master
    paths:
      - "main.py"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/main.yml"
  workflow_dispatch:

concurrency:
  group: ai-worker-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSHPASS: ${{ secrets.SSH_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.PY_WORKER_DEPLOY_PATH || secrets.DEPLOY_PATH }}
      IMAGE_NAME: ${{ secrets.PY_WORKER_IMAGE_NAME || 'interview-ai-worker' }}
      CONTAINER_NAME: ${{ secrets.PY_WORKER_CONTAINER_NAME || 'interview-ai-worker' }}
      HOST_PORT: ${{ secrets.PY_WORKER_HOST_PORT || '8099' }}
      CONTAINER_PORT: ${{ secrets.PY_WORKER_CONTAINER_PORT || '8099' }}
      IMAGE_TAR_NAME: ${{ secrets.PY_WORKER_IMAGE_TAR_NAME || 'ai-worker-image.tar' }}
      REMOTE_DOCKER: ${{ secrets.REMOTE_DOCKER || 'docker' }}
      ENABLE_STT: ${{ secrets.ENABLE_STT || 'false' }}
      ENABLE_TTS: ${{ secrets.ENABLE_TTS || 'false' }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install sshpass
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Build ai-worker docker image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE_REF" .

      - name: Save ai-worker image archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          IMAGE_REF="${IMAGE_NAME}:${GITHUB_SHA}"
          docker save "$IMAGE_REF" -o "release/${IMAGE_TAR_NAME}"

      - name: Trust remote host
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Stop existing ai-worker container
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "set -e; if $REMOTE_DOCKER ps -a --format '{{.Names}}' | grep -qx '$CONTAINER_NAME'; then $REMOTE_DOCKER stop '$CONTAINER_NAME' >/dev/null 2>&1 || true; $REMOTE_DOCKER rm '$CONTAINER_NAME' >/dev/null 2>&1 || true; fi"

      - name: Upload ai-worker image
        shell: bash
        run: |
          set -euo pipefail
          sshpass -e rsync -az -e "ssh -p $SSH_PORT" "release/${IMAGE_TAR_NAME}" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/${IMAGE_TAR_NAME}"

      - name: Load new ai-worker image and prune old tags
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="${IMAGE_NAME}:${GITHUB_SHA}"
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "set -e; cd '$DEPLOY_PATH'; $REMOTE_DOCKER load -i '$IMAGE_TAR_NAME'; rm -f '$IMAGE_TAR_NAME'; for img in \$($REMOTE_DOCKER images '$IMAGE_NAME' --format '{{.Repository}}:{{.Tag}}' | grep -vFx '$IMAGE_REF' || true); do $REMOTE_DOCKER rmi -f \"\$img\" >/dev/null 2>&1 || true; done"

      - name: Run ai-worker container
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="${IMAGE_NAME}:${GITHUB_SHA}"
          sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "IMAGE_REF='$IMAGE_REF' CONTAINER_NAME='$CONTAINER_NAME' HOST_PORT='$HOST_PORT' CONTAINER_PORT='$CONTAINER_PORT' REMOTE_DOCKER='$REMOTE_DOCKER' ENABLE_STT='$ENABLE_STT' ENABLE_TTS='$ENABLE_TTS' bash -s" <<'EOF'
          set -euo pipefail
          $REMOTE_DOCKER run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            --add-host=host.docker.internal:host-gateway \
            -e WORKER_HOST=0.0.0.0 \
            -e WORKER_PORT="$CONTAINER_PORT" \
            -e ENABLE_STT="$ENABLE_STT" \
            -e ENABLE_TTS="$ENABLE_TTS" \
            -p "$HOST_PORT:$CONTAINER_PORT" \
            "$IMAGE_REF"
          EOF

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if sshpass -e ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "curl -fsS http://127.0.0.1:${HOST_PORT}/health > /dev/null 2>&1"; then
              echo "AI worker is healthy"
              exit 0
            fi
            echo "Waiting for ai-worker... ($i/30)"
            sleep 3
          done
          echo "AI worker health check failed"
          exit 1
