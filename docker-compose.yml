services:
  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: interview-ai-worker:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WORKER_PUBLIC_PORT:-9000}:${WORKER_PORT:-9000}"
    environment:
      WORKER_HOST: "0.0.0.0"
      WORKER_PORT: "${WORKER_PORT:-9000}"
      ENABLE_LLM: "${ENABLE_LLM:-false}"
      LLM_MODEL_NAME: "${LLM_MODEL_NAME:-external-api}"
      LLM_API_URL: "${LLM_API_URL:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_API_TIMEOUT_SECONDS: "${LLM_API_TIMEOUT_SECONDS:-45}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OLLAMA_LIGHT_MODEL: "${OLLAMA_LIGHT_MODEL:-qwen2:1.5b}"
      OLLAMA_HEAVY_MODEL: "${OLLAMA_HEAVY_MODEL:-mistral:7b-instruct}"
      OLLAMA_AUTO_PULL: "${OLLAMA_AUTO_PULL:-true}"
      OLLAMA_PRELOAD_ON_STARTUP: "${OLLAMA_PRELOAD_ON_STARTUP:-true}"
      OLLAMA_PULL_TIMEOUT_SECONDS: "${OLLAMA_PULL_TIMEOUT_SECONDS:-900}"
      AI_FOUNDATION_MIN_SAMPLES: "${AI_FOUNDATION_MIN_SAMPLES:-300}"
      ENABLE_STT: "${ENABLE_STT:-true}"
      ENABLE_TTS: "${ENABLE_TTS:-false}"
      STT_MODEL_ID: "${STT_MODEL_ID:-base}"
      STT_PRIORITY_MODE: "${STT_PRIORITY_MODE:-worker_first}"
      STT_DEVICE: "${STT_DEVICE:-cpu}"
      STT_COMPUTE_TYPE: "${STT_COMPUTE_TYPE:-int8}"
      RAG_FETCH_ONLINE: "${RAG_FETCH_ONLINE:-true}"
      COUNTER_Q_ENABLED: "${COUNTER_Q_ENABLED:-true}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${WORKER_PORT:-9000}/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

