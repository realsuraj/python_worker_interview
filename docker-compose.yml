services:
  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: interview-ai-worker:latest
    ports:
      - "${WORKER_PUBLIC_PORT:-9000}:${WORKER_PORT:-9000}"
    environment:
      WORKER_HOST: "0.0.0.0"
      WORKER_PORT: "${WORKER_PORT:-9000}"
      DEEPSEEK_MODEL_NAME: "${DEEPSEEK_MODEL_NAME:-Qwen/Qwen2.5-1.5B-Instruct}"
      SEMANTIC_MODEL_NAME: "${SEMANTIC_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}"
      LLM_MIN_NEW_TOKENS: "${LLM_MIN_NEW_TOKENS:-24}"
      LLM_MAX_NEW_TOKENS: "${LLM_MAX_NEW_TOKENS:-64}"
      LLM_TEMPERATURE: "${LLM_TEMPERATURE:-0.2}"
      LLM_TOP_P: "${LLM_TOP_P:-0.8}"
      LLM_LOAD_IN_4BIT: "${LLM_LOAD_IN_4BIT:-true}"
      LLM_4BIT_COMPUTE_DTYPE: "${LLM_4BIT_COMPUTE_DTYPE:-float16}"
      ANSWER_JUDGE_MODE: "${ANSWER_JUDGE_MODE:-hybrid}"
      LLM_JUDGE_MAX_NEW_TOKENS: "${LLM_JUDGE_MAX_NEW_TOKENS:-80}"
      ASKQUESTION_WAIT_MS: "${ASKQUESTION_WAIT_MS:-200}"
      PREFETCH_ON_STARTINTERVIEW: "${PREFETCH_ON_STARTINTERVIEW:-true}"
      GENERATION_WORKERS: "${GENERATION_WORKERS:-4}"
      DEFAULT_TOTAL_QUESTIONS: "${DEFAULT_TOTAL_QUESTIONS:-15}"
      MAX_TOTAL_QUESTIONS: "${MAX_TOTAL_QUESTIONS:-15}"
      INTERVIEW_SESSION_TTL_SECONDS: "${INTERVIEW_SESSION_TTL_SECONDS:-28800}"
      QUESTION_REPEAT_RATE: "${QUESTION_REPEAT_RATE:-0.10}"
      ROLE_QUESTION_HISTORY_LIMIT: "${ROLE_QUESTION_HISTORY_LIMIT:-1200}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${WORKER_PORT:-9000}/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

